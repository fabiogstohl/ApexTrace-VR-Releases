name: Feature request
description: Suggest a focused improvement to ApexTrace VR
title: "[Feature] "
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Describe the driving or setup problem rather than only the proposed control.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Driving HUD
        - Vehicle HUD
        - Race / start HUD
        - Fuel / energy / warnings
        - OpenXR positioning
        - Desktop overlay
        - Control panel
        - Installer / diagnostics
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
